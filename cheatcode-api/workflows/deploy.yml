name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - 'cheatcode-api/**'
  pull_request:
    branches: [main]
    paths:
      - 'cheatcode-api/**'

defaults:
  run:
    working-directory: cheatcode-api   # all steps run from here

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: cheatcode-api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: pytest tests/ -v --tb=short
