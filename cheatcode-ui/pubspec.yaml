name: cheatcode
description: Unfair advantage for technical interviews.
version: 1.0.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_card_swiper: ^7.0.0
  google_fonts: ^6.1.0
  animated_text_kit: ^4.2.2
  google_sign_in: ^6.2.1
  http: ^1.6.0
  flutter_native_splash: ^2.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.10

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"

flutter_native_splash:
  color: "#080808"
  color_dark: "#080808"
  image: assets/icon/icon.png
  android_12:
    color: "#080808"
    color_dark: "#080808"
    image: assets/icon/icon.png
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon/